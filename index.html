<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect fill='rgba(51,51,51,.06)' height='19' rx='5.5' stroke='%23333333' stroke-width='1.4' width='19' x='2.5' y='2.5'%3E%3C/rect%3E%3Crect fill='%23333333' height='4' rx='1.2' width='4' x='6' y='6'%3E%3C/rect%3E%3Crect fill='%23333333' height='4' opacity='.4' rx='1.2' width='4' x='14' y='6'%3E%3C/rect%3E%3Crect fill='%23333333' height='4' opacity='.4' rx='1.2' width='4' x='6' y='14'%3E%3C/rect%3E%3Crect fill='%23333333' height='4' rx='1.2' width='4' x='14' y='14'%3E%3C/rect%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://agenttag.ai/" />

    <title>AgentTag - Identity for AI agents · Free public beta</title>
    <meta name="description" content="AgentTag is the control plane that gives an autonomous agent its own credentials, inbox, phone, cards, and compute governed by cryptographic mandates." />

    <!-- Open Graph / Social Meta -->
    <meta property="og:title" content="AgentTag - Identity for AI agents" />
    <meta property="og:description" content="The control plane that gives an autonomous agent its own credentials, inbox, phone, cards, and compute governed by cryptographic mandates." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agenttag.ai/" />
    <meta property="og:site_name" content="AgentTag" />
    <!-- TODO before launch: add a hosted 1200x630 og:image (e.g. /og.png), then switch twitter:card to summary_large_image -->
    <!-- We will add og.png + flip twitter:card to summary_large_image in TODO.md follow-up. Setting twitter:card now so it caches correctly once og.png lands. -->
    <meta property="og:image" content="https://agenttag.ai/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgentTag - Identity for AI agents" />
    <meta name="twitter:description" content="The control plane that gives an autonomous agent its own credentials, inbox, phone, cards, and compute governed by cryptographic mandates." />
    <meta name="twitter:image" content="https://agenttag.ai/og.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:opsz,wght@14..32,400..700&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet">
    
    <!-- Prevent flash of unapplied theme -->
    <script>
      (function(){try{if(localStorage.getItem('aeg-theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}})()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
